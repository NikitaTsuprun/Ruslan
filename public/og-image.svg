    <text x="30" y="46" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="23" font-weight="800" fill="#ffffff" letter-spacing="4">BANK</text>
    <rect x="30" y="66" width="60" height="46" rx="9" fill="#ffe39a"/>
    <text x="30" y="160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="25" font-weight="600" fill="#ffffff" letter-spacing="2">5413 •••• •••• 4417</text>
    <text x="30" y="194" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#d4e6fb" letter-spacing="2">RUSLAN GANEEV</text>
  </g>

  <circle cx="1064" cy="206" r="54" fill="#16a86b" stroke="#ffffff" stroke-width="9"/>
  <path d="M1039 207 l17 17 l33 -36" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
