  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1090" cy="80" r="250" fill="#d8e7fb" opacity="0.5"/>
  <circle cx="120" cy="610" r="210" fill="#e1f1fb" opacity="0.6"/>
  <rect width="1200" height="10" fill="#0468d6"/>

  <rect x="70" y="84" width="430" height="48" rx="24" fill="#dcebfc"/>
  <text x="94" y="115" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0468d6" letter-spacing="1.5">ПОМОЩЬ ПО 115-ФЗ И 161-ФЗ</text>

  <text x="68" y="234" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#0b1c3a">Разблокировка</text>
  <text x="68" y="316" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#0b1c3a">карт и счетов</text>

  <text x="70" y="372" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#445069">Снятие блокировки, вывод из базы ЦБ&#160;РФ,</text>
  <text x="70" y="410" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#445069">восстановление доступа к деньгам.</text>

  <circle cx="106" cy="502" r="40" fill="url(#mark)"/>
  <text x="106" y="514" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="31" font-weight="800" fill="#ffffff" text-anchor="middle">РГ</text>
  <text x="166" y="494" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="31" font-weight="800" fill="#0b1c3a">Руслан Ганеев</text>
  <text x="166" y="528" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#7b8aa3">Москва и вся Россия — дистанционно</text>

  <g transform="translate(788 188) rotate(-9 170 107)">
